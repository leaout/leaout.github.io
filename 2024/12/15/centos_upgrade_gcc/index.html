    <h1 id="CentOS-升级-GCC"><a href="#CentOS-升级-GCC" class="headerlink" title="CentOS 升级 GCC"></a>CentOS 升级 GCC</h1><h2 id="方法一：使用-SCL"><a href="#方法一：使用-SCL" class="headerlink" title="方法一：使用 SCL"></a>方法一：使用 SCL</h2><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line">scl <span class="built_in">enable</span> devtoolset-7 bash</span><br><span class="line">vim /etc/profile</span><br><span class="line"><span class="built_in">source</span> /opt/rh/devtoolset-7/enable</span><br></pre></td></tr></table></figure>

<h2 id="方法二：源码编译"><a href="#方法二：源码编译" class="headerlink" title="方法二：源码编译"></a>方法二：源码编译</h2><p>GCC 源码地址：<a target="_blank" rel="noopener" href="http://ftp.gnu.org/gnu/gcc">http://ftp.gnu.org/gnu/gcc</a></p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line">wget http://ftp.gnu.org/gnu/gcc/gcc-8.3.0/gcc-8.3.0.tar.gz</span><br><span class="line">tar -zxvf gcc-8.3.0.tar.gz</span><br><span class="line"><span class="built_in">cd</span> gcc-8.3.0</span><br><span class="line"><span class="comment"># 利用源码包里自带的工具下载所需要的依赖项，确保系统可以联网</span></span><br><span class="line">./contrib/download_prerequisites</span><br></pre></td></tr></table></figure>

<h3 id="安装"><a href="#安装" class="headerlink" title="安装"></a>安装</h3><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line"><span class="built_in">mkdir</span> build  <span class="comment"># 创建编译输出目录</span></span><br><span class="line"><span class="built_in">cd</span> build</span><br><span class="line">../configure --enable-checking=release --enable-languages=c,c++ --disable-multilib  <span class="comment"># 生成 Makefile</span></span><br><span class="line">make         <span class="comment"># 编译</span></span><br><span class="line">make install <span class="comment"># 安装</span></span><br></pre></td></tr></table></figure>
